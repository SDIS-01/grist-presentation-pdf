<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
    --green:#9BBB59; --green-pale:#EDF3DF; --green-text:#5E7A34;
    --yellow:#FFCC00; --yellow-pale:#FFF6D6; --yellow-text:#8C6D00;
    --purple:#8064A2; --purple-pale:#E9E2F0; --purple-text:#4E3A72;
    --orange:#F79646; --orange-pale:#FDEEE1; --orange-text:#B35D15;
    --red:#C0504D; --red-pale:#F6E1E0; --red-text:#8C3A38;
    --gray:#808080; --gray-pale:#ECECEC; --gray-text:#4D4D4D;
    --bleu-france:#002395;
}
body{font-family:Tahoma,Geneva,sans-serif;margin:0;background:#f4f4f4;}
#toolbar{
    padding:10px 14px;background:#fff;border-bottom:1px solid #ddd;
    display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
#toolbar select{min-height:34px;padding:4px 8px;font-size:13px;flex:1 1 260px;max-width:480px;}
#toolbar button{
    min-height:34px;padding:6px 16px;font-size:13px;font-weight:700;
    border:none;border-radius:4px;background:var(--bleu-france);color:#fff;cursor:pointer;
}
#toolbar button:hover{background:#001c73;}
#toolbar button:disabled{background:#aaa;cursor:default;}
#status{font-size:12px;color:#666;}


#pagesContainer{padding:20px;display:flex;flex-direction:column;align-items:center;gap:24px;}
.pdf-page{
    width:1123px;height:794px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.15);
    color:#1a1a1a;display:flex;flex-direction:column;overflow:hidden;flex:0 0 auto;
}
.page-header{display:block;padding:0;flex:0 0 auto;overflow:visible;line-height:0;position:relative;}
.page-header img{width:100%;height:122.93px;display:block;object-fit:cover;}
.header-title-overlay{
    position:absolute;left:230px;right:16px;top:50%;transform:translateY(-50%);
    background:#fff;color:var(--bleu-france);font-weight:700;font-size:15px;
    padding:7px 16px;border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.25);
    line-height:1.3;text-align:center;
}
.page-header-plain{flex:0 0 auto;padding:14px 30px 6px 30px;border-bottom:1px solid #eee;}
.header-title-overlay-plain{
    color:var(--bleu-france);font-weight:700;font-size:15px;text-align:center;
}
.page-footer-image{flex:0 0 auto;line-height:0;}
.page-footer-image img{width:100%;height:119.64px;display:block;object-fit:cover;}
.page-body{padding:20px 30px;flex:1;overflow:hidden;}
.page-footer{padding:8px 30px;border-top:1px solid #eee;font-size:10px;color:#888780;flex:0 0 auto;}

.proj-title-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:12px;}
.proj-title{font-size:19px;font-weight:700;color:var(--bleu-france);max-width:820px;}
.page-num{font-size:10px;color:#5f5e5a;white-space:nowrap;}

.left-col{width:250px;flex:0 0 auto;}
.right-col{flex:1;min-width:0;}
.body-flex{display:flex;gap:24px;}

.donut-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;}
.donut{
    position:relative;width:88px;height:88px;flex:0 0 auto;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
}
.donut-inner{
    width:64px;height:64px;border-radius:50%;background:#fff;
    display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#1a1a1a;
}
.donut-label{font-size:12px;color:#5f5e5a;}

.badge-list{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
.badge-item{background:#eef2f8;border-radius:6px;padding:7px 11px;font-size:12px;}
.badge-item .k{color:#5f5e5a;}
.badge-item .v{font-weight:700;color:var(--bleu-france);white-space:pre-wrap;}

.section-title{font-size:12px;font-weight:700;margin-bottom:6px;color:var(--bleu-france);}
.comment-box{
    font-size:11px;color:#333;background:#fafaf8;border-radius:6px;padding:9px 11px;
    line-height:1.45;margin-bottom:14px;border-left:3px solid var(--bleu-france);
    white-space:pre-wrap;
}
.instance-box{font-size:11px;line-height:1.7;white-space:pre-wrap;}

.gantt-header{display:flex;font-size:9.5px;color:#5f5e5a;border-bottom:1px solid #eee;padding-bottom:3px;margin-bottom:5px;}
.gantt-header .name-col{width:34px;flex:0 0 auto;}
.gantt-header .unit{flex:1;text-align:center;}
.gantt-row{display:flex;align-items:center;height:22px;margin-bottom:3px;}
.gantt-row .name-col{width:34px;flex:0 0 auto;font-size:11px;font-weight:700;color:#5f5e5a;text-align:center;}
.gantt-track{flex:1;position:relative;height:100%;}
.gantt-bar-bg{position:absolute;top:4px;height:14px;border-radius:3px;overflow:hidden;}
.gantt-bar-fill{position:absolute;top:0;left:0;bottom:0;}

table.actions-table{width:100%;border-collapse:collapse;font-size:11px;}
table.actions-table th{padding:5px 4px;color:#5f5e5a;font-weight:700;text-align:left;border-bottom:1px solid #b9c6dc;}
table.actions-table td{padding:5px 4px;border-bottom:1px solid #eef2f8;white-space:pre-wrap;}
.tasks-recap-table .action-row td{background:#f7f9fc;border-top:1px solid #b9c6dc;}
.tasks-recap-table .task-row td{color:#5f5e5a;font-size:10.5px;}
.pct-badge{padding:2px 10px;border-radius:8px;font-weight:700;display:inline-block;}

.journal-entry{margin-bottom:9px;font-size:11.5px;line-height:1.7;white-space:pre-wrap;}
.budget-placeholder{font-size:11px;color:#b4b2a9;font-style:italic;}
</style>
</head>
<body>

<div id="toolbar">
  <input type="text" id="projectSelect" list="projectOptions" placeholder="Choisir un projet… (tapez pour rechercher)" autocomplete="off" style="min-height:34px;padding:4px 8px;font-size:13px;flex:1 1 320px;max-width:520px;border:1px solid #ccc;border-radius:4px;">
  <datalist id="projectOptions"></datalist>
  <button id="generateBtn">Télécharger le PDF</button>
  <div style="display:flex;flex-direction:column;gap:2px;">
    <button id="saveForLaterBtn" type="button" style="min-height:34px;padding:6px 14px;font-size:12px;border:1px solid #2e7d32;background:#fff;color:#2e7d32;border-radius:4px;cursor:pointer;white-space:nowrap;flex:0 0 auto;">💾 Sauvegarder pour plus tard</button>
    <span style="font-size:10.5px;color:var(--red);font-weight:400;">Sauvegarde supprimée automatiquement après 1 mois</span>
  </div>
  <button id="deleteSaveBtn" type="button" style="display:none;min-height:34px;padding:6px 14px;font-size:12px;border:1px solid #b91c1c;background:#fff;color:#b91c1c;border-radius:4px;cursor:pointer;white-space:nowrap;flex:0 0 auto;">🗑 Supprimer la sauvegarde</button>
  <button id="resetBtn" type="button" style="min-height:34px;padding:6px 14px;font-size:12px;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;white-space:nowrap;flex:0 0 auto;color:#333;">Réinitialiser</button>
  <span id="status"></span>
</div>

<div id="extraCommentBar" style="padding:10px 14px;background:#fff;border-bottom:1px solid #ddd;">
  <label for="extraCommentInput" style="display:block;font-size:12px;color:#555;margin-bottom:4px;">Commentaire additionnel (imprimé sur le PDF, sauvegarde manuelle par projet)</label>
  <textarea id="extraCommentInput" rows="3" style="width:100%;max-width:700px;box-sizing:border-box;padding:6px 8px;font-size:12px;font-family:Tahoma,Geneva,sans-serif;border:1px solid #ccc;border-radius:4px;resize:vertical;" placeholder="Écrire un commentaire à inclure dans ce PDF…"></textarea>
  <div id="extraCommentControls" style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap;"></div>
</div>

<div id="manualPagesBar" style="padding:10px 14px;background:#fff;border-bottom:1px solid #ddd;">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
    <label style="font-size:12px;color:#555;">Pages additionnelles (texte libre + image, imprimées sur le PDF, sauvegarde manuelle par projet — 4 pages maximum au total)</label>
    <button id="addPageBtn" type="button" style="min-height:30px;padding:5px 12px;font-size:12px;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;white-space:nowrap;">+ Ajouter une page</button>
  </div>
  <div id="manualPagesList"></div>
  <div id="manualPagesWarning" style="font-size:11px;color:#b35d15;"></div>
</div>

<div id="tasksBar" style="padding:10px 14px;background:#fff;border-bottom:1px solid #ddd;">
  <label style="font-size:12px;color:#555;display:flex;align-items:center;gap:6px;">
    <input type="checkbox" id="includeTasksCheckbox">
    Inclure les actions MEO avec leurs tâches
  </label>
  <div id="tasksActionsList"></div>
</div>

<div id="tasksConfigModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.3);z-index:100;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:8px;padding:20px;width:520px;max-width:92vw;max-height:85vh;overflow-y:auto;box-shadow:0 8px 30px rgba(0,0,0,.3);">
    <h3 style="margin:0 0 4px 0;font-size:15px;color:#002395;">Configuration — Actions MEO et tâches</h3>
    <div style="font-size:11px;color:#888;margin-bottom:14px;">Les tâches sont stockées dans une table Grist séparée, reliée à l'action par une colonne de référence. Indiquez ici les identifiants exacts utilisés dans Grist.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label style="display:block;font-size:11px;color:#888;">Table des tâches (nom exact dans Grist)</label>
        <input type="text" id="tasksTableIdInput" placeholder="ex: Taches" style="width:100%;box-sizing:border-box;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#888;">Colonne de référence vers l'action</label>
        <input type="text" id="tasksRefColInput" placeholder="ex: Action" style="width:100%;box-sizing:border-box;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#888;">Colonne Libellé de la tâche</label>
        <input type="text" id="tasksLabelColInput" placeholder="ex: Libelle_Tache" style="width:100%;box-sizing:border-box;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#888;">Colonne Commentaire de la tâche</label>
        <input type="text" id="tasksCommentaireColInput" placeholder="ex: Commentaire" style="width:100%;box-sizing:border-box;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#888;">Colonne Avancement de la tâche</label>
        <input type="text" id="tasksAvancementColInput" placeholder="ex: Avancement" style="width:100%;box-sizing:border-box;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
      </div>
      <div>
        <label style="display:block;font-size:11px;color:#888;">Colonne Responsable de la tâche</label>
        <input type="text" id="tasksResponsableColInput" placeholder="ex: Responsable" style="width:100%;box-sizing:border-box;padding:5px 7px;font-size:12px;border:1px solid #ccc;border-radius:4px;">
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <button id="closeTasksConfigBtn" type="button" style="padding:6px 14px;font-size:12px;border-radius:4px;cursor:pointer;background:#002395;color:#fff;border:none;">Fermer</button>
    </div>
  </div>
</div>

<div id="pagesContainer"></div>


<script>
grist.ready({
requiredAccess:'full',
onEditOptions: function(){
    fillTasksConfigInputs()
    document.getElementById("tasksConfigModal").style.display = "flex"
},

{name:'idProjet',title:'ID_Projet_Action_AV'},
{name:'idAction',title:'ID_Action_MEO'},
{name:'nature',title:'Nature'},

{name:'dateFin',title:'Date_Fin', optional:true},
{name:'dateSuspension',title:'Date_Suspension', optional:true},

{name:'avancement',title:'Avancement', optional:true},
{name:'porteur',title:'Porteur', optional:true},
{name:'priorite',title:'Priorité', optional:true},
{name:'commentaire',title:'Commentaire', optional:true},
{name:'descriptif',title:'Descriptif', optional:true},
{name:'journalBord',title:'Journal_bord', optional:true},
{name:'groupement',title:'Groupement', optional:true},
{name:'passageInstance',title:'Passage_Instance_Concatener', optional:true},

{name:'mec2023',title:'MEC 2023', optional:true},
{name:'duerp',title:'DUERP', optional:true},
{name:'vissct',title:'VISSCT', optional:true}
]
})

function parseDate(v){
    if(!v) return null
    if(typeof v==="number"){ if(v<10000000000)v*=1000; return new Date(v) }
    let d = new Date(v)
    return isNaN(d)?null:d
}

function formatDateFr(v){
    let d = parseDate(v)
    if(!d) return ""
    let day = String(d.getDate()).padStart(2,'0')
    let month = String(d.getMonth()+1).padStart(2,'0')
    return `${day}/${month}/${d.getFullYear()}`
}

function displayValue(v){
    if(v===null || v===undefined) return ""
    if(Array.isArray(v)){
        let arr = v[0]==='L' ? v.slice(1) : v
        return arr.map(displayValue).join("\n")
    }
    if(typeof v === "object"){
        if('value' in v) return displayValue(v.value)
        return ""
    }
    return String(v)
}

// Neutralise les espaces superflus (début/fin, espaces multiples) pour que la
// correspondance entre l'ID_Projet du projet et celui des actions ne casse pas
// à cause d'un espace tapé ou copié-collé par erreur dans Grist.
function normalizeId(s){
    return String(s || "").replace(/\s+/g, " ").trim()
}

function getPercent(v){
    if(v===null || v===undefined || v==="") return 0
    let n = Number(v)
    if(isNaN(n)) return 0
    if(n<=1) n = n*100
    return Math.max(0, Math.min(100, Math.round(n)))
}

function isFlagTrue(v){
    if(v===true) return true
    if(v===false || v===null || v===undefined) return false
    let s = displayValue(v).trim().toLowerCase()
    if(s === "" || s === "0" || s === "false" || s === "non" || s === "no") return false
    return true
}

// Extrait le texte d'une cellule (mono ou multi-valeurs), en dédupliquant
// les valeurs identiques et en les séparant par des sauts de ligne.
function dedupedMultiValue(raw){
    if(raw === null || raw === undefined) return ""
    if(Array.isArray(raw)){
        let arr = raw[0]==='L' ? raw.slice(1) : raw
        let vals = arr.map(displayValue).map(s=>s.trim()).filter(s=>s!=="")
        let unique = [...new Set(vals)]
        return unique.join("\n")
    }
    return displayValue(raw).trim()
}

function isInterrompu(r, m){
    return !!(parseDate(r[m.dateSuspension]) || parseDate(r[m.dateAbandon]))
}

// Retourne le jeu de couleurs (fond clair / couleur pleine / texte fonce) pour un pourcentage donne
function bandColors(pct, interrompu, useGlobalPalette){
    if(interrompu) return {fill:"var(--gray)", pale:"var(--gray-pale)", text:"var(--gray-text)"}
    if(pct >= 100) return {fill:"var(--green)", pale:"var(--green-pale)", text:"var(--green-text)"}
    if(pct >= 50){
        return useGlobalPalette
            ? {fill:"var(--purple)", pale:"var(--purple-pale)", text:"var(--purple-text)"}
            : {fill:"var(--yellow)", pale:"var(--yellow-pale)", text:"var(--yellow-text)"}
    }
    if(pct >= 1) return {fill:"var(--orange)", pale:"var(--orange-pale)", text:"var(--orange-text)"}
    return {fill:"var(--red)", pale:"var(--red-pale)", text:"var(--red-text)"}
}

function priorityBadgeStyle(label){
    let s = (label||"").toLowerCase()
    if(s.startsWith("p1")) return {bg:"var(--red)", color:"#fff"}
    if(s.startsWith("p2")) return {bg:"var(--orange)", color:"#fff"}
    if(s.startsWith("p3")) return {bg:"var(--yellow)", color:"#4d3d00"}
    if(s.startsWith("interrompu")) return {bg:"#595959", color:"#fff"}
    if(s.startsWith("termin")) return {bg:"var(--green)", color:"#fff"}
    return {bg:"var(--bleu-france)", color:"#fff"}
}

function escapeHtml(s){
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
}

// ===== Selection du projet =====
const projectSelect = document.getElementById("projectSelect")
const projectOptions = document.getElementById("projectOptions")
let knownProjects = []

function isProjectRow(r, m){
    let n = displayValue(r[m.nature]).trim().toLowerCase()
    return n === "av" || n === "peps"
}

function refreshProjectList(){
    let m = currentMappings
    if(!m.idProjet || !m.nature) return
    let projects = currentRecords
        .filter(r => isProjectRow(r, m))
        .map(r => normalizeId(displayValue(r[m.idProjet])))
        .filter(v => v !== "")
    knownProjects = [...new Set(projects)].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}))

    let signature = knownProjects.join("|")
    if(projectOptions.dataset.signature !== signature){
        projectOptions.dataset.signature = signature
        projectOptions.innerHTML = knownProjects.map(p => `<option value="${escapeAttr(p)}"></option>`).join("")
    }
}

function escapeAttr(s){
    return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;")
}

let selectedTaskActionIds = new Set()
let taskActionIdsSeen = new Set()

function renderTasksActionsList(actionRows, m){
    let container = document.getElementById("tasksActionsList")
    let checked = document.getElementById("includeTasksCheckbox").checked
    if(!checked || actionRows.length === 0){
        container.innerHTML = ""
        return
    }
    actionRows.forEach(a=>{
        if(!taskActionIdsSeen.has(a.id)){
            taskActionIdsSeen.add(a.id)
            selectedTaskActionIds.add(a.id) // sélectionnée par défaut
        }
    })
    container.innerHTML = `
      <div style="margin-top:8px;padding:8px;border:1px solid #eee;border-radius:6px;max-height:160px;overflow-y:auto;">
        <div style="font-size:11px;color:#888;margin-bottom:6px;">Choisissez les actions à inclure :</div>
        ${actionRows.map(a=>{
            let name = displayValue(a[m.idAction])
            let isChecked = selectedTaskActionIds.has(a.id)
            return `<label style="display:flex;align-items:center;gap:6px;font-size:12px;padding:2px 0;">
              <input type="checkbox" class="taskActionCheckbox" data-id="${a.id}" ${isChecked?"checked":""}>
              ${escapeHtml(name)}
            </label>`
        }).join("")}
      </div>`
    container.querySelectorAll(".taskActionCheckbox").forEach(el=>{
        el.onchange = (e)=>{
            let id = Number(e.target.dataset.id)
            if(e.target.checked) selectedTaskActionIds.add(id)
            else selectedTaskActionIds.delete(id)
            renderPages()
        }
    })
}

document.getElementById("includeTasksCheckbox").onchange = (e)=>{

function refToRowId(ref){
    // Une colonne Reference est generalement serialisee comme un entier (id de ligne),
    // parfois enveloppee dans un tableau selon les cas.
    if(typeof ref === "number") return ref
    if(Array.isArray(ref)) return ref[ref.length-1]
    return null
}

async function fetchTasksByActionId(){
    if(!tasksConfig.tableId) return new Map()
    try{
        let table = await Promise.race([
            grist.docApi.fetchTable(tasksConfig.tableId),
            new Promise((_, reject)=> setTimeout(()=>reject(new Error("Délai dépassé lors de la lecture de la table des tâches")), 10000))
        ])
        let ids = table.id || []
        let byAction = new Map()
        for(let i=0;i<ids.length;i++){
            let actionRowId = refToRowId(table[tasksConfig.refCol] ? table[tasksConfig.refCol][i] : null)
            if(actionRowId === null) continue
            let task = {
                label: table[tasksConfig.labelCol] ? table[tasksConfig.labelCol][i] : "",
                commentaire: table[tasksConfig.commentaireCol] ? table[tasksConfig.commentaireCol][i] : "",
                avancement: table[tasksConfig.avancementCol] ? table[tasksConfig.avancementCol][i] : null,
                responsable: table[tasksConfig.responsableCol] ? table[tasksConfig.responsableCol][i] : ""
            }
            if(!byAction.has(actionRowId)) byAction.set(actionRowId, [])
            byAction.get(actionRowId).push(task)
        }
        return byAction
    }catch(err){
        console.error("Erreur lecture table des tâches:", err)
        return null
    }
}

// Regroupe les lignes d'un journal de bord : une ligne commençant par une date démarre une
// nouvelle entrée, les lignes suivantes sans date (sous-puces) sont rattachées à cette même entrée,
// pour ne jamais les séparer sur deux pages différentes.
function groupJournalLines(lines){
    let dateLineRegex = /^\d{1,2}[\/\.\-]\d{1,2}[\/\.\-]\d{2,4}/
    let groups = []
    lines.forEach(line=>{
        if(groups.length === 0 || dateLineRegex.test(line.trim())){
            groups.push([line])
        } else {
            groups[groups.length-1].push(line)
        }
    })
    return groups.map(g => g.join("\n"))
}

function buildAtomicAuxEntries(projectRow, actionRows, selectedActionRows, tasksByActionId, m){
    let entries = []

    let journalText = projectRow ? displayValue(projectRow[m.journalBord]) : ""
    let journalLines = journalText.split("\n").filter(l=>l.trim()!=="")
    if(journalLines.length === 0){
        entries.push({kind:'journal', html:`<div style="font-size:11px;color:#999;">Aucune entrée</div>`})
    } else {
        let journalHtml = groupJournalLines(journalLines)
            .map(groupText => `<div class="journal-entry">${escapeHtml(groupText)}</div>`)
            .join("")
        entries.push({kind:'journal', html: journalHtml})
    }

    let extraComment = document.getElementById("extraCommentInput").value.trim()
    if(extraComment){
        entries.push({kind:'extraComment', html:`<div class="comment-box" style="${textStyleFor(extraCommentStyle)}">${escapeHtml(extraComment)}</div>`})
    }

    if(tasksByActionId){
        selectedActionRows.forEach(a=>{
            entries.push({kind:'tasksRow', html: buildOneActionTasksRowGroup(a, tasksByActionId, m)})
        })
    }

    actionRows.forEach(a=>{
        let j = m.journalBord ? displayValue(a[m.journalBord]) : ""
        if(j.trim() !== ""){
            let name = displayValue(a[m.idAction])
            let html = `
              <div style="margin-top:10px;">
                <div style="font-size:11.5px;font-weight:700;color:var(--bleu-france);margin-bottom:4px;">${escapeHtml(name)}</div>
                ${j.split("\n").filter(l=>l.trim()!=="").map(l=>`<div class="journal-entry">${escapeHtml(l)}</div>`).join("")}
              </div>`
            entries.push({kind:'actionsJournal', html})
        }
    })

    return entries
}

function renderAuxPageHtml(entries){
    if(entries.length === 0) return ""
    let html = ""
    let i = 0
    while(i < entries.length){
        let kind = entries[i].kind
        let meta = SECTION_META[kind]
        let groupHtml = ""
        while(i < entries.length && entries[i].kind === kind){
            groupHtml += entries[i].html
            i++
        }
        html += `<div class="section-title" style="margin-top:18px;">${meta.title}</div>${meta.open}${groupHtml}${meta.close}`
    }
    return html
}

function measureHtmlHeight(html, title, pageIndex){
    let probe = document.createElement("div")
    probe.style.position = "absolute"
    probe.style.left = "-9999px"
    probe.style.top = "0"
    document.body.appendChild(probe)
    let testPage = buildPageShell(title, "Page 1/1", html, true, pageIndex)
    probe.appendChild(testPage)
    let height = testPage.scrollHeight
    document.body.removeChild(probe)
    return height
}

function packContentPages(mainBodyHtml, auxEntries, title){
    function htmlFor(isFirst, auxList){
        let auxHtml = renderAuxPageHtml(auxList)
        return isFirst ? (mainBodyHtml + auxHtml) : auxHtml
    }
    function measure(isFirst, auxList){
        return measureHtmlHeight(htmlFor(isFirst, auxList), title, isFirst ? 1 : 2)
    }

    let pages = []
    let state = {currentAux: [], pageIsFirst: true}

    function closePage(){
        pages.push({isFirst: state.pageIsFirst, html: htmlFor(state.pageIsFirst, state.currentAux)})
        state.pageIsFirst = false
        state.currentAux = []
    }

    // Ajoute des entrées au fil de l'eau, une par une, en démarrant une nouvelle page dès que ça déborde.
    function appendFlow(entries){
        for(let entry of entries){
            let candidate = state.currentAux.concat([entry])
            let height = measure(state.pageIsFirst, candidate)
            if(height > 794 && state.currentAux.length > 0){
                closePage()
                state.currentAux = [entry]
            } else if(height > 794 && state.currentAux.length === 0 && state.pageIsFirst){
                pages.push({isFirst: true, html: mainBodyHtml})
                state.pageIsFirst = false
                state.currentAux = [entry]
            } else {
                state.currentAux = candidate
            }
        }
    }

    // Ajoute un bloc qui doit rester entier si possible : tient-il en entier sur la page courante ?
    // Sinon, page suivante entière. Si allowSplit est vrai et que ça ne tient toujours pas en entier,
    // découpe entrée par entrée en dernier recours (jamais au milieu d'une action+tâches) ; sinon
    // (journal de bord), le bloc reste entier sur cette page même s'il déborde légèrement.
    function appendAtomicBlock(entries, allowSplit){
        if(entries.length === 0) return
        let withBlock = state.currentAux.concat(entries)
        if(measure(state.pageIsFirst, withBlock) <= 794){
            state.currentAux = withBlock
            return
        }
        if(state.currentAux.length > 0){
            closePage()
        } else if(state.pageIsFirst){
            pages.push({isFirst: true, html: mainBodyHtml})
            state.pageIsFirst = false
        }
        if(!allowSplit || measure(state.pageIsFirst, entries) <= 794){
            state.currentAux = entries
        } else {
            appendFlow(entries)
        }
    }

    let journalEntries = auxEntries.filter(e=>e.kind==='journal')
    let extraCommentEntries = auxEntries.filter(e=>e.kind==='extraComment')
    let tasksEntries = auxEntries.filter(e=>e.kind==='tasksRow')
    let actionsJournalEntries = auxEntries.filter(e=>e.kind==='actionsJournal')

    appendAtomicBlock(journalEntries, false)
    appendFlow(extraCommentEntries)
    appendAtomicBlock(tasksEntries, true)
    appendFlow(actionsJournalEntries)

    if(state.pageIsFirst){
        pages.push({isFirst: true, html: htmlFor(true, state.currentAux)})
    } else {
        pages.push({isFirst: false, html: htmlFor(false, state.currentAux)})
    }
    return pages
}

function cleanupExpiredSaves(){
    let changed = false
    let now = Date.now()
    Object.keys(pagesDataByProject).forEach(id=>{
        let entry = pagesDataByProject[id]
        if(!entry || !entry.savedAt || (now - entry.savedAt) > SAVE_RETENTION_MS){
            delete pagesDataByProject[id]
            changed = true
        }
    })
    if(changed) grist.setOption("pagesDataByProject", pagesDataByProject)
}

function savePagesDataForProject(id){
    if(!id) return
    pagesDataByProject[id] = {
        extraComment: document.getElementById("extraCommentInput").value,
        extraCommentStyle: Object.assign({}, extraCommentStyle),
        manualPages: JSON.parse(JSON.stringify(manualPages)),
        savedAt: Date.now()
    }
    grist.setOption("pagesDataByProject", pagesDataByProject)
}

function deleteSavedPagesForProject(id){
    if(!id) return
    delete pagesDataByProject[id]
    grist.setOption("pagesDataByProject", pagesDataByProject)
}

function hasSavedPagesForProject(id){
    return !!(id && pagesDataByProject[id])
}

function loadPagesDataForProject(id){
    currentProjectIdForPages = id
    let data = id ? pagesDataByProject[id] : null
    if(data){
        document.getElementById("extraCommentInput").value = data.extraComment || ""

let renderGeneration = 0

async function renderPages(){
    let myGeneration = ++renderGeneration
    let container = document.getElementById("pagesContainer")
    let m = currentMappings
    refreshProjectList()

    let selectedId = normalizeId(projectSelect.value)

    // Les pages additionnelles et le commentaire sont propres à chaque projet :
    // on sauvegarde ceux du projet précédent puis on charge ceux du nouveau.
    if(selectedId !== currentProjectIdForPages){
        loadPagesDataForProject(selectedId)
    }

    if(!selectedId || !m.idProjet){
        container.innerHTML = `<div style="color:#888;font-size:13px;padding:40px;">Sélectionnez un projet ci-dessus pour afficher son récapitulatif.</div>`
        document.getElementById("generateBtn").disabled = true
        document.getElementById("tasksActionsList").innerHTML = ""
        updateAddPageState(1)
        return
    }
    document.getElementById("generateBtn").disabled = false

    let projectRow = currentRecords.find(r => isProjectRow(r, m) && normalizeId(displayValue(r[m.idProjet])) === selectedId)
    let genuineActionRows = currentRecords.filter(r =>
        !isProjectRow(r, m) &&
        normalizeId(displayValue(r[m.idProjet])) === selectedId
    )
    // Certaines lignes ont une Nature valant AV/PEPS par erreur (souvent quand leur intitulé
    // reprend celui du projet), ce qui les fait disparaître alors que ce sont en réalité des
    // actions. On ne les récupère que s'il n'existe aucune autre action réelle pour ce projet.
    let misclassifiedRows = currentRecords.filter(r =>
        isProjectRow(r, m) &&
        normalizeId(displayValue(r[m.idProjet])) === selectedId &&
        (!projectRow || r.id !== projectRow.id)
    )
    // Si aucune vraie action (Nature=MEO) ni ligne dupliquée mal classée n'existe, la ligne du
    // projet elle-même sert de seule action (même intitulé, mêmes dates, tâches rattachées dessus).
    let fallbackRows = misclassifiedRows.length > 0 ? misclassifiedRows : (projectRow ? [projectRow] : [])
    let actionRows = genuineActionRows.length > 0 ? genuineActionRows : fallbackRows

    let title = projectRow ? displayValue(projectRow[m.idProjet]) : selectedIdFallback()
    let mainBodyHtml = buildMainBodyHtml(projectRow, actionRows, m)

    renderTasksActionsList(actionRows, m)

    let tasksByActionId = null
    if(document.getElementById("includeTasksCheckbox").checked){
        document.getElementById("status").textContent = "Chargement des tâches…"
        tasksByActionId = await fetchTasksByActionId()
        // Une exécution plus récente de renderPages() a déjà pris le relais : on abandonne celle-ci
        // pour ne jamais écraser un rendu à jour avec des données obsolètes.
        if(myGeneration !== renderGeneration) return
        if(tasksByActionId === null){
            document.getElementById("status").textContent = "Erreur : impossible de lire la table des tâches (vérifiez la configuration ci-dessus)."
        } else {
            document.getElementById("status").textContent = "Mise en page…"
        }
    }

    try{
        let selectedActionRows = actionRows.filter(a => selectedTaskActionIds.has(a.id))
        let auxEntries = buildAtomicAuxEntries(projectRow, actionRows, selectedActionRows, tasksByActionId, m)

        let contentPages = packContentPages(mainBodyHtml, auxEntries, title)
        let contentTruncated = false
        if(contentPages.length > 4){
            contentPages = contentPages.slice(0, 4)
            contentTruncated = true
        }
        let autoPageCount = contentPages.length

        if(myGeneration !== renderGeneration) return

        let maxManualAllowed = Math.max(0, 4 - autoPageCount)
        let manualToRender = manualPages.slice(0, maxManualAllowed)
        let totalPages = autoPageCount + manualToRender.length

        container.innerHTML = ""
        contentPages.forEach((page, i)=>{
            let pageIndex = i+1
            container.appendChild(buildPageShell(title, `Page ${pageIndex}/${totalPages}`, page.html, false, pageIndex))
        })
        manualToRender.forEach((p, i)=>{
            let pageIndex = autoPageCount+i+1
            let label = `Page ${pageIndex}/${totalPages}`
            container.appendChild(buildPageShell(title, label, buildManualPageBodyHtml(p), false, pageIndex))
        })

        let manualTruncated = manualPages.length > maxManualAllowed
        document.getElementById("manualPagesWarning").textContent = contentTruncated
            ? "Le contenu dépasse la limite de 4 pages : une partie n'est pas incluse dans le PDF."
            : (manualTruncated ? "Limite de 4 pages atteinte : certaines pages additionnelles ne sont pas incluses dans le PDF." : "")
        updateAddPageState(autoPageCount)
        if(document.getElementById("status").textContent === "Mise en page…") document.getElementById("status").textContent = ""
    }catch(err){
        console.error("Erreur lors de la construction des pages:", err)
        document.getElementById("status").textContent = "Erreur lors de la mise en page. Essayez de décocher/recocher, ou vérifiez la console (F12)."
    }
}

function updateAddPageState(autoPageCount){
    let addBtn = document.getElementById("addPageBtn")
    if(addBtn) addBtn.disabled = (autoPageCount + manualPages.length) >= 4
}

function textStyleFor(page){
    let fontSize = page.fontSize || 13
    let bold = page.bold ? "700" : "400"
    let italic = page.italic ? "italic" : "normal"
    let underline = page.underline ? "underline" : "none"
    let color = page.color || "#1a1a1a"
    return `font-size:${fontSize}px;font-weight:${bold};font-style:${italic};text-decoration:${underline};color:${color};`
}

function buildManualPageBodyHtml(page){
    let layout = page.layout || "top"
    let hasImage = !!page.imageDataUrl
    let hasText = !!page.text

    let imgHtml = hasImage ? `<img src="${page.imageDataUrl}" style="max-width:100%;max-height:100%;object-fit:contain;">` : ``
    let textHtml = hasText
        ? `<div style="white-space:pre-wrap;line-height:1.6;${textStyleFor(page)}">${escapeHtml(page.text)}</div>`
        : (hasImage ? `` : `<div style="font-size:11px;color:#999;font-style:italic;">Page vierge — ajoutez du texte ou une image via les contrôles ci-dessus.</div>`)

    if(!hasImage) return `<div style="padding-top:6px;">${textHtml}</div>`
    if(!hasText) return `<div style="padding-top:6px;text-align:center;">${imgHtml}</div>`

    if(layout === "bottom"){
        return `
          <div style="padding-top:6px;">
            ${textHtml}
            <div style="text-align:center;margin-top:16px;">${imgHtml}</div>
          </div>`
    }
    if(layout === "left"){
        return `
          <div style="padding-top:6px;display:flex;gap:20px;align-items:flex-start;">
            <div style="flex:0 0 45%;">${imgHtml}</div>
            <div style="flex:1;">${textHtml}</div>
          </div>`
    }
    if(layout === "right"){
        return `
          <div style="padding-top:6px;display:flex;gap:20px;align-items:flex-start;">
            <div style="flex:1;">${textHtml}</div>
            <div style="flex:0 0 45%;">${imgHtml}</div>
          </div>`
    }
    // "top" par défaut
    return `
      <div style="padding-top:6px;">
        <div style="text-align:center;margin-bottom:16px;">${imgHtml}</div>
        ${textHtml}
      </div>`
}

        }
    })
    list.querySelectorAll(".manualPageFontSize").forEach(el=>{
        el.onchange = (e)=>{
            manualPages[Number(e.target.dataset.idx)].fontSize = Number(e.target.value)
            renderPages()
        }
    })
    list.querySelectorAll(".manualPageBold").forEach(el=>{
        el.onclick = (e)=>{
            let idx = Number(e.target.dataset.idx)
            manualPages[idx].bold = !manualPages[idx].bold
            renderManualPagesControls()
            renderPages()
        }
    })
    list.querySelectorAll(".manualPageItalic").forEach(el=>{
        el.onclick = (e)=>{
            let idx = Number(e.target.dataset.idx)
            manualPages[idx].italic = !manualPages[idx].italic
            renderManualPagesControls()
            renderPages()
        }
    })
    list.querySelectorAll(".manualPageUnderline").forEach(el=>{
        el.onclick = (e)=>{
            let idx = Number(e.target.dataset.idx)
            manualPages[idx].underline = !manualPages[idx].underline
            renderManualPagesControls()
            renderPages()
        }
    })
    list.querySelectorAll(".manualPageColor").forEach(el=>{
        el.onchange = (e)=>{
            manualPages[Number(e.target.dataset.idx)].color = e.target.value
            renderPages()
        }
    })
    list.querySelectorAll(".manualPageLayout").forEach(el=>{
        el.onchange = (e)=>{
            manualPages[Number(e.target.dataset.idx)].layout = e.target.value
            renderPages()
        }
    })
    list.querySelectorAll(".removePageBtn").forEach(el=>{
        el.onclick = (e)=>{
            manualPages.splice(Number(e.target.dataset.idx), 1)
            renderManualPagesControls()
            renderPages()
        }
    })
}

function buildPageShell(title, pageLabel, bodyHtml, autoHeight, pageIndex){
    let page = document.createElement("div")
    page.className = "pdf-page"
    if(autoHeight) page.style.height = "auto"

    let headerSection = (pageIndex === 1)
        ? `<div class="page-header">${headerHtml()}<div class="header-title-overlay">${escapeHtml(title)}</div></div>`
        : `<div class="page-header-plain"><div class="header-title-overlay-plain">${escapeHtml(title)}</div></div>`

    let footerSection = (pageIndex === 1)
        ? `<div class="page-footer">${escapeHtml(footerWithDate())}</div>`
        : `<div class="page-footer-image"><img src="${SECONDARY_HEADER_IMAGE_BASE64}" alt="SDIS de l'Ain"></div>`

    page.innerHTML = `
      ${headerSection}
      <div class="page-body">
        <div class="proj-title-row" style="justify-content:flex-end;">
          <div class="page-num">${pageLabel}</div>
        </div>
        ${bodyHtml}
      </div>
      ${footerSection}
    `
    return page
}

function buildMainBodyHtml(projectRow, actionRows, m){
    let groupement = projectRow ? displayValue(projectRow[m.groupement]) : ""
    let porteur = projectRow ? displayValue(projectRow[m.porteur]) : ""
    let priorite = projectRow ? displayValue(projectRow[m.priorite]) : ""
    let commentaire = projectRow ? displayValue(projectRow[m.commentaire]) : ""
    let descriptif = projectRow ? displayValue(projectRow[m.descriptif]) : ""
    let passageInstance = projectRow ? displayValue(projectRow[m.passageInstance]) : ""
    let avancementGlobal = projectRow ? getPercent(projectRow[m.avancement]) : 0
    let donutColors = {fill:"var(--green)", pale:"var(--green-pale)", text:"var(--green-text)"}

    let rattachements = [
        {flag: m.projetEtablissement, label: "Projet établissement 2023-2028"},
        {flag: m.sdacr, label: "SDACR 2025-2030"},
        {flag: m.mec2023, label: "MEC 2023", redTitle: true},
        {flag: m.duerp, label: "DUERP", redTitle: true},
        {flag: m.vissct, label: "VISSCT"}
    ].map(r=>{
        if(!r.flag || !projectRow) return null
        let raw = projectRow[r.flag]
        if(!isFlagTrue(raw)) return null
        let text = dedupedMultiValue(raw)
        let isBooleanish = (raw === true || text.toLowerCase() === "true" || text === "1")
        return {label: r.label, text: isBooleanish ? "" : text, redTitle: !!r.redTitle}
    }).filter(r => r !== null)

    return `
        <div class="body-flex">
          <div class="left-col">
            <div class="donut-row">
              <div class="donut" style="background:conic-gradient(${donutColors.fill} 0% ${avancementGlobal}%, #e6e6e6 ${avancementGlobal}% 100%);">
                <div class="donut-inner">${avancementGlobal}%</div>
              </div>
              <div class="donut-label">Avancement<br>global</div>
            </div>
            <div class="badge-list">
              ${groupement ? `<div class="badge-item"><span class="k">Groupement</span> <span class="v">${escapeHtml(groupement)}</span></div>` : ``}
              ${porteur ? `<div class="badge-item"><span class="k">Porteur</span> <span class="v">${escapeHtml(porteur)}</span></div>` : ``}
              ${priorite ? `<div class="badge-item"><span class="k">Priorité</span> <span class="pct-badge" style="background:${priorityBadgeStyle(priorite).bg};color:${priorityBadgeStyle(priorite).color};">${escapeHtml(priorite)}</span></div>` : ``}
              ${rattachements.map(r=>`<div class="badge-item"><span class="k" style="font-weight:700;color:${r.redTitle ? "var(--red)" : "#333"};display:block;">${escapeHtml(r.label)}</span><span class="k" style="white-space:pre-wrap;display:block;">${escapeHtml(r.text || "Oui")}</span></div>`).join("")}
            </div>
            ${commentaire ? `<div class="section-title">Commentaire</div><div class="comment-box">${escapeHtml(commentaire)}</div>` : ``}
            ${passageInstance ? `<div class="section-title">Passages en instance</div><div class="instance-box">${escapeHtml(passageInstance)}</div>` : ``}
          </div>
          <div class="right-col">
            ${descriptif ? `<div class="section-title">Descriptif</div><div class="comment-box">${escapeHtml(descriptif)}</div>` : ``}
            <div class="section-title">Planning</div>
            ${buildGanttHtml(actionRows, m, actionNumbers(actionRows))}
            <div class="section-title">Actions</div>
            ${buildActionsTableHtml(actionRows, m, actionNumbers(actionRows))}
          </div>
        </div>
    `
}

// ===== Mini planning (Gantt) =====
function actionNumbers(actionRows){
    let map = new Map()
    actionRows.forEach((r, i) => map.set(r.id, i+1))
    return map
}

function buildGanttHtml(actionRows, m, numMap){
    let dated = actionRows
        .map(r => ({r, start:parseDate(r[m.dateDebut]), end:parseDate(r[m.dateFin])}))
        .filter(x => x.start || x.end)

    if(dated.length === 0){
        return `<div style="font-size:11px;color:#999;margin-bottom:14px;">Aucune date renseignée sur les actions.</div>`
    }

    let allDates = []
    dated.forEach(x=>{ if(x.start) allDates.push(x.start); if(x.end) allDates.push(x.end) })
    let minDate = new Date(Math.min(...allDates))
    let maxDate = new Date(Math.max(...allDates))

    let today = new Date()
    let currentYear = today.getFullYear()
    let nextYear = currentYear + 1
    let minYear = minDate.getFullYear()
    let maxYear = maxDate.getFullYear()

    // Trimestres pour l'année en cours et la suivante ; simple année pour le reste
    let units = []
    for(let year = minYear; year <= maxYear; year++){
        if(year === currentYear || year === nextYear){
            for(let q=0; q<4; q++){
                units.push({start: new Date(year, q*3, 1), end: new Date(year, q*3+3, 1), label:`T${q+1} ${year}`})
            }
        } else {
            units.push({start: new Date(year, 0, 1), end: new Date(year+1, 0, 1), label:`${year}`})
        }
    }

    let min = units[0].start
    let max = units[units.length-1].end
    let totalSpan = max - min

    let todayPct = (today >= min && today <= max) ? ((today-min)/totalSpan)*100 : null

    let rows = dated.slice(0, 8).map(x=>{
        let s = x.start || min
        let e = x.end || max
        let leftPct = Math.max(0, Math.min(100, ((s-min)/totalSpan)*100))
        let widthPct = Math.max(1.5, Math.min(100-leftPct, ((e-s)/totalSpan)*100))
        let pct = getPercent(x.r[m.avancement])
        let interrompu = isInterrompu(x.r, m)
        let colors = bandColors(pct, interrompu)
        let name = displayValue(x.r[m.idAction]) || displayValue(x.r[m.idProjet])
        let num = numMap.get(x.r.id)
        return `
          <div class="gantt-row">
            <div class="name-col" title="${escapeAttr(name)}">${num}</div>
            <div class="gantt-track">
              <div class="gantt-bar-bg" style="left:${leftPct}%;width:${widthPct}%;background:${colors.pale};">
                <div class="gantt-bar-fill" style="width:${pct}%;background:${colors.fill};"></div>
              </div>
            </div>
          </div>`
    }).join("")

    return `
      <div style="margin-bottom:16px;position:relative;">
        <div class="gantt-header">
          <div class="name-col"></div>
          ${units.map(u=>`<div class="unit">${u.label}</div>`).join("")}
        </div>
        ${rows}
        ${todayPct!==null ? `<div style="position:absolute;top:0;bottom:0;left:34px;right:0;pointer-events:none;"><div style="position:absolute;top:0;bottom:0;left:${todayPct}%;width:1px;background:#d32f2f;"></div></div>` : ``}
      </div>`
}

function buildActionsTableHtml(actionRows, m, numMap){
    if(actionRows.length === 0){
        return `<div style="font-size:11px;color:#999;">Aucune action associée à ce projet.</div>`
    }
    let rows = actionRows.map(r=>{
        let name = displayValue(r[m.idAction])
        let porteur = displayValue(r[m.porteur])
        let pct = getPercent(r[m.avancement])
        let interrompu = isInterrompu(r, m)
        let colors = bandColors(pct, interrompu)
        let label = interrompu ? "Interrompu" : `${pct}%`
        let num = numMap.get(r.id)
        return `<tr>
            <td>${num}</td>
            <td>${escapeHtml(name)}</td>
            <td>${escapeHtml(porteur)}</td>
            <td><span class="pct-badge" style="background:${colors.pale};color:${colors.text};">${label}</span></td>
          </tr>`
    }).join("")
    return `
      <table class="actions-table">
        <tr><th>#</th><th>Action</th><th>Porteur</th><th>Avancement</th></tr>
        ${rows}
      </table>`
}

// ===== Export PDF =====
document.getElementById("generateBtn").onclick = async ()=>{
    let btn = document.getElementById("generateBtn")
    let status = document.getElementById("status")
    btn.disabled = true
    status.textContent = "Génération du PDF…"

    try{
        let pages = document.querySelectorAll(".pdf-page")
        let pdf = new window.jspdf.jsPDF({orientation:"landscape", unit:"px", format:[1123,794]})

        for(let i=0; i<pages.length; i++){
            let canvas = await html2canvas(pages[i], {scale:2, useCORS:true})
            let imgData = canvas.toDataURL("image/jpeg", 0.95)
            if(i>0) pdf.addPage([1123,794], "landscape")
            pdf.addImage(imgData, "JPEG", 0, 0, 1123, 794)
        }

        let filename = (projectSelect.value || "recap").replace(/[^a-z0-9_\-]+/gi, "_").slice(0,60) + ".pdf"
        pdf.save(filename)
        status.textContent = ""
    }catch(err){
        status.textContent = "Erreur lors de la génération du PDF."
        console.error(err)
    }
    btn.disabled = false
}

let renderDebounceTimer = null
function scheduleRenderPages(){
    if(renderDebounceTimer) clearTimeout(renderDebounceTimer)
    renderDebounceTimer = setTimeout(()=>{
        renderDebounceTimer = null
        renderPages()
    }, 200)
}

grist.onRecords((records, mappings)=>{
    currentRecords = records
    currentMappings = mappings
    scheduleRenderPages()
})
